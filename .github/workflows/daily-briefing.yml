name: Daily DevTrend Agent Report

on:
  schedule:
    # 한국 오전 8시 = UTC 23:00
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "보고서 주제"
        required: false
        default: "최신 AI 이미지 생성 툴 트렌드"

jobs:
  run-agent-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install scheduled agent dependencies
        working-directory: scheduled-agent
        run: npm install

      - name: Load saved report topic from Cloudflare KV
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SCHEDULE_SECRET: ${{ secrets.SCHEDULE_SECRET }}
          MANUAL_TOPIC: ${{ github.event.inputs.topic }}
        run: |
          set -e

          if [ -n "$MANUAL_TOPIC" ]; then
            echo "Using manual topic from workflow_dispatch input."
            topic="$MANUAL_TOPIC"
            enabled="true"
          else
            response=$(curl -fsS "$APP_BASE_URL/api/scheduled-settings?token=$SCHEDULE_SECRET")
            echo "$response"

            enabled=$(echo "$response" | jq -r '.settings.enabled')
            topic=$(echo "$response" | jq -r '.settings.topic')
          fi

          if [ "$enabled" != "true" ]; then
            echo "Daily report is disabled by saved settings."
            exit 0
          fi

          if [ -z "$topic" ] || [ "$topic" = "null" ]; then
            echo "No topic configured."
            exit 1
          fi

          echo "DAILY_TOPIC<<EOF" >> "$GITHUB_ENV"
          echo "$topic" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

          echo "Loaded topic: $topic"

      - name: Run exported Agent Builder workflow
        working-directory: scheduled-agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
          MCP_ACCESS_TOKEN: ${{ secrets.MCP_ACCESS_TOKEN }}
          DAILY_TOPIC: ${{ github.event.inputs.topic || secrets.DAILY_TOPIC }}
        run: npm run start
